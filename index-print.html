<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แบบฟอร์มอาจารย์พิเศษ (พิมพ์) · มหาวิทยาลัยศรีปทุม</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: #fff;
      font-size: 12pt;
      color: #000;
    }

    /* Hide interactive/loading elements */
    #loading-screen {
      display: none !important;
    }

    #root {
      display: block !important;
    }

    /* Override app background */
    #root>div {
      background: #fff !important;
      min-height: auto !important;
    }

    /* Header print style */
    .print-header {
      background: #1e3a8a !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Hide action buttons, records list, toast */
    .no-print {
      display: none !important;
    }

    /* Card styles for print */
    @media print {
      @page {
        size: A4 portrait;
        margin: 1cm 1.2cm;
      }

      body {
        font-size: 10pt;
      }

      /* Force colors */
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Page breaks between sections */
      .print-section {
        break-inside: avoid;
        margin-bottom: 12pt;
      }

      .print-page-break {
        break-before: page;
      }

      /* Hide non-essential UI */
      button,
      .no-print,
      [style*="position: fixed"] {
        display: none !important;
      }

      /* Compact layout */
      input,
      select,
      textarea {
        border: 1px solid #999 !important;
        background: #fff !important;
        -webkit-appearance: none;
      }
    }

    /* Screen print preview styles */
    .print-wrapper {
      max-width: 210mm;
      margin: 0 auto;
      padding: 10mm;
      background: #fff;
    }

    .print-doc-header {
      text-align: center;
      border-bottom: 2px solid #1e3a8a;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }

    .print-doc-header h1 {
      font-size: 16pt;
      font-weight: 800;
      color: #1e3a8a;
    }

    .print-doc-header p {
      font-size: 10pt;
      color: #555;
      margin-top: 3px;
    }

    .print-section {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      margin-bottom: 8px;
      break-inside: avoid;
    }

    .section-title {
      background: #eff6ff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 4px 10px;
      font-size: 10pt;
      font-weight: 700;
      color: #1e3a8a;
      border-bottom: 1px solid #d1d5db;
      border-radius: 6px 6px 0 0;
    }

    .section-body {
      padding: 6px 10px;
    }

    .field-grid {
      display: grid;
      gap: 6px 10px;
    }

    .field-grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    .field-grid-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .field-grid-1 {
      grid-template-columns: 1fr;
    }

    .field-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field-label {
      font-size: 8pt;
      font-weight: 600;
      color: #555;
    }

    .field-value {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 9.5pt;
      min-height: 20px;
      background: #fff;
    }

    .field-value.empty {
      color: #bbb;
      font-style: italic;
    }

    .field-value-multiline {
      min-height: 44px;
      line-height: 1.5;
    }

    .edu-item,
    .work-item,
    .course-item {
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      padding: 6px 8px;
      margin-bottom: 4px;
      break-inside: avoid;
    }

    .item-label {
      font-size: 8pt;
      font-weight: 700;
      color: #7c3aed;
      margin-bottom: 6px;
    }

    .qual-item {
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      margin-bottom: 6px;
      overflow: hidden;
      break-inside: avoid;
    }

    .qual-group-header {
      background: #f8fafc;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 5px 10px;
      font-size: 9pt;
      font-weight: 600;
    }

    .qual-group-body {
      padding: 6px 10px;
    }

    .qual-checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }

    .checkbox-box {
      width: 12px;
      height: 12px;
      border: 1.5px solid #666;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 10pt;
    }

    .result-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 8pt;
      font-weight: 700;
      color: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      margin-left: 8px;
    }

    .page-break {
      break-before: page;
    }

    @media screen {
      body {
        background: #e5e7eb;
      }

      .print-wrapper {
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.15);
      }
    }
  </style>
</head>

<body>

  <div class="no-print"
    style="text-align: center; padding: 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px;">
    <button onclick="window.print()"
      style="background: linear-gradient(135deg, #1a56db, #2563eb); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 12pt; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 2px 8px rgba(26,86,219,0.25);">🖨️
      พิมพ์ / บันทึกเป็น PDF</button>
  </div>

  <div class="print-wrapper" id="print-content">
    <!-- Will be populated by JS from localStorage -->
    <div class="print-doc-header">
      <h1>🎓 <span style="color: #E6007F;">SRIPATUM</span> <span style="color: #000;">UNIVERSITY</span></h1>
      <p style="color: #000;">Adjunct Instructor Information Form · มหาวิทยาลัยศรีปทุม (Sripatum University)</p>
    </div>
    <div id="form-data-container">
      <p style="text-align:center; color:#999; padding: 40px;">กำลังโหลดข้อมูล...</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "oaa_form_data_v1";

    function val(v, fallback) {
      return (v && String(v).trim()) ? String(v).trim() : (fallback || "");
    }

    function fieldHtml(label, value, opts) {
      const v = val(value);
      const cls = v ? "" : " empty";
      const multiline = opts && opts.multiline;
      return `<div class="field-item">
    <div class="field-label">${label}</div>
    <div class="field-value${cls}${multiline ? ' field-value-multiline' : ''}">${v || '—'}</div>
  </div>`;
    }

    function gridHtml(cols, ...fields) {
      const valid = fields.filter(Boolean);
      return `<div class="field-grid field-grid-${cols}">${valid.join('')}</div>`;
    }

    function renderRecord(data) {
      const title = val(data.titlePrefix) === "อื่นๆ / Other" ? val(data.titleCustom) : val(data.titlePrefix);
      const fullNameTH = `${title} ${val(data.firstNameTH)} ${val(data.lastNameTH)}`.trim();
      const fullNameEN = `${val(data.firstNameEN)} ${val(data.lastNameEN)}`.trim();

      // === Educations ===
      const eduItems = (data.educations || []).map((edu, i) => `
    <div class="edu-item">
      <div class="item-label">วุฒิการศึกษาที่ ${i + 1}</div>
      ${gridHtml(2,
        fieldHtml("ระดับการศึกษา", edu.level),
        fieldHtml("ปีที่สำเร็จการศึกษา (พ.ศ.)", edu.year)
      )}
      ${gridHtml(1, fieldHtml("หลักสูตร", edu.curriculum))}
      ${gridHtml(1, fieldHtml("สถาบันที่สำเร็จการศึกษา", edu.institution))}
    </div>`).join('');

      // === Experiences ===
      const workItems = (data.experiences || []).map((w, i) => `
    <div class="work-item">
      <div class="item-label" style="color:#059669">ประสบการณ์ที่ ${i + 1}</div>
      ${gridHtml(2,
        fieldHtml("ตำแหน่ง", w.position),
        fieldHtml("สถานประกอบการ", w.company)
      )}
      ${gridHtml(3,
        fieldHtml("วันเริ่ม", w.startDate),
        fieldHtml("วันสิ้นสุด", w.isCurrent ? "ปัจจุบัน" : w.endDate),
        fieldHtml("สถานะ", w.isCurrent ? "ทำงานอยู่ปัจจุบัน" : "สิ้นสุดแล้ว")
      )}
    </div>`).join('');

      // === Awards & Achievements ===
      const awardItems = (data.awards || []).map((a, i) => `
    <div class="work-item" style="border-color: #059669">
      <div class="item-label" style="color:#059669">ผลงาน/รางวัลที่ ${i + 1}</div>
      ${gridHtml(2,
        fieldHtml("ชื่อรางวัล / ผลงานที่เกี่ยวข้อง", a.title),
        fieldHtml("ลิงก์ผลงาน", a.link)
      )}
    </div>`).join('');

      // === Courses ===
      const courseItems = (data.courses || []).map((c, i) => {
        return `<div class="course-item">
      <div class="item-label" style="color:#dc6b19">รายวิชาที่ ${i + 1}</div>
      ${gridHtml(2,
          fieldHtml("รายวิชา (รหัส - ชื่อ)", c.subject),
          fieldHtml("ระดับการศึกษา", c.degreeLevel)
        )}
      ${gridHtml(2,
          fieldHtml("หน่วยกิต", c.credits),
          // fieldHtml("จำนวนครั้งที่สอน", c.teachCount)
        )}
    </div>`;
      }).join('');

      // === Qualifications ===
      const subs = data.qualSubs || {};
      const fields = data.qualFields || {};

      // Dynamic calculation of experience duration to show in Group 2/3
      const getExpMonths = (startDate, endDate) => {
        if (!startDate) return 0;
        const start = new Date(startDate);
        const end = endDate ? new Date(endDate) : new Date();
        let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
        return months > 0 ? months : 0;
      };

      const totalDirectMonths = (data.experiences || [])
        .filter(w => w.isDirect)
        .reduce((acc, w) => acc + getExpMonths(w.startDate, w.isCurrent ? null : w.endDate), 0);

      let totalDirectExpString = "";
      if (totalDirectMonths > 0) {
        const years = Math.floor(totalDirectMonths / 12);
        const rem = totalDirectMonths % 12;
        if (years === 0) totalDirectExpString = ` (รวม ${rem} เดือน)`;
        else if (rem === 0) totalDirectExpString = ` (รวม ${years} ปี)`;
        else totalDirectExpString = ` (รวม ${years} ปี ${rem} เดือน)`;
      } else {
        totalDirectExpString = " (รวม 0 เดือน)";
      }

      const qualGroups = [
        {
          label: "กลุ่มที่ 1",
          result: "อาจารย์พิเศษ", color: "#1a56db",
          subs: [
            { key: "qual1_a", label: "อาจารย์ผู้สอน อาจเป็นอาจารย์ประจำหรืออาจารย์พิเศษที่มีคุณวุฒิขั้นต่ำปริญญาโทหรือเทียบเท่า" },
          ]
        },
        {
          label: "กลุ่มที่ 2",
          result: "อาจารย์พิเศษร่วมสอน", color: "#059669",
          subs: [
            { key: "qual2_a", label: "คุณวุฒิปริญญาตรี และมีประสบการณ์ทำงานในภาคอุตสาหกรรมที่เกี่ยวข้องมาเเล้วไม่น้อยกว่า 5 ปี" },
            { key: "qual2_c", label: "มีความรู้และประสบการณ์เป็นที่ยอมรับซึ่งตรงหรือสัมพันธ์กับรายวิชาที่สอน หรือผลงานเป็นที่ประจักษ์ในวิชาชีพ" },
          ]
        },
        {
          label: "กลุ่มที่ 3",
          result: "อาจารย์พิเศษช่วยสอน", color: "#dc6b19",
          subs: [
            { key: "qual3_a", label: "คุณวุฒิปริญญาตรี และมีประสบการณ์ทำงานในภาคอุตสาหกรรม อย่างต่อเนื่องมาแล้วไม่เกิน 5 ปี" },
          ]
        }
      ];

      const anySelected = g => g.subs.some(s => subs[s.key]);

      const qualHtml = qualGroups.map(g => {
        const selected = anySelected(g);
        return `<div class="qual-item">
      <div class="qual-group-header">
        ${g.label}
        ${selected ? `<span class="result-badge" style="background:${g.color}">${g.result}</span>` : ''}
      </div>
      <div class="qual-group-body">
        ${g.subs.map(s => `
          <div class="qual-checkbox-row">
            <div class="checkbox-box">${subs[s.key] ? '✓' : ''}</div>
            <span style="font-size:9pt">${s.label}</span>
          </div>`).join('')}
      </div>
    </div>`;
      }).join('');

      return `
    <!-- Section 1 -->
    <div class="print-section">
      <div class="section-title">1. ข้อมูลภาคการศึกษาและคณะ/สาขาวิชา</div>
      <div class="section-body">
        ${gridHtml(1, fieldHtml("ประจำภาคการศึกษา", data.semester))}
        ${gridHtml(2, fieldHtml("คณะ / School", data.faculty), fieldHtml("สาขาวิชา / Program", data.branch))}
      </div>
    </div>

    <!-- Section 2 -->
    <div class="print-section">
      <div class="section-title">2. ข้อมูลส่วนตัว</div>
      <div class="section-body">
        ${gridHtml(2,
        fieldHtml("ชื่อ-นามสกุล (ไทย)", fullNameTH),
        fieldHtml("Name (English)", fullNameEN)
      )}
        ${gridHtml(1, fieldHtml("หมายเลขโทรศัพท์", data.phone))}
        ${gridHtml(1, fieldHtml("ที่อยู่", data.address, { multiline: true }))}
      </div>
    </div>

    <!-- Section 3 -->
    <div class="print-section">
      <div class="section-title">3. วุฒิการศึกษา</div>
      <div class="section-body">${eduItems || '<p style="color:#999;font-size:9pt">ไม่มีข้อมูล</p>'}</div>
    </div>

    <!-- Section 4 -->
    <div class="print-section">
      <div class="section-title">4. ประสบการณ์ทำงานและผลงาน</div>
      <div class="section-body">
        <div style="font-size: 9.5pt; font-weight: 700; color: #1e293b; margin-bottom: 6px; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px;">4.1 ประสบการณ์การทำงาน</div>
        ${workItems || '<p style="color:#999;font-size:9pt;margin-bottom:12px;">ไม่มีข้อมูล</p>'}
        <div style="font-size: 9.5pt; font-weight: 700; color: #1e293b; margin-top: 10px; margin-bottom: 6px; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px;">4.2 รางวัลและผลงานที่เกี่ยวข้อง</div>
        ${awardItems || '<p style="color:#999;font-size:9pt">ไม่มีข้อมูล</p>'}
      </div>
    </div>

    <!-- Section 5 -->
    <div class="print-section">
      <div class="section-title">5. รายวิชาที่สอน</div>
      <div class="section-body">${courseItems || '<p style="color:#999;font-size:9pt">ไม่มีข้อมูล</p>'}</div>
    </div>

    <!-- Section 6 -->
    <div class="print-section">
      <div class="section-title">6. คุณสมบัติ</div>
      <div class="section-body">${qualHtml}</div>
    </div>

    <!-- Section 7 -->
    <div class="print-section">
      <div class="section-title">7. ความยินยอมข้อมูลส่วนบุคคล (PDPA)</div>
      <div class="section-body">
        ${data.pdpaConsent ? `
        <div class="field-item">
          <div class="field-value field-value-multiline" style="display: flex; gap: 8px; align-items: flex-start;">
            <div class="checkbox-box" style="margin-top: 2px;">✓</div>
            <span style="flex: 1; font-size: 9pt;">ข้าพเจ้ายินยอมให้ มหาวิทยาลัยศรีปทุม เก็บรวบรวม ใช้ และเปิดเผยข้อมูลส่วนบุคคลของข้าพเจ้า เพื่อวัตถุประสงค์ในการบันทึกข้อมูลอาจารย์พิเศษเเละใช้ภายในมหาลัย ตามที่ระบุไว้ในนโยบายความเป็นส่วนตัว</span>
          </div>
        </div>
        ` : '<p style="color:#999;font-size:9pt">ไม่ได้ยินยอมข้อมูลส่วนบุคคล (PDPA)</p>'}
      </div>
    </div>

    

    <div style="text-align:center;font-size:8pt;color:#aaa;margin-top:12px;border-top:1px solid #e5e7eb;padding-top:8px">
      พิมพ์เมื่อ: ${new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}
      · ระบบบันทึกข้อมูลอาจารย์พิเศษ มหาวิทยาลัยศรีปทุม
    </div>
  `;
    }

    function loadAndRender() {
      const container = document.getElementById('form-data-container');
      try {
        const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (records.length === 0) {
          container.innerHTML = `
        <div style="text-align:center;padding:40px;color:#666">
          <div style="font-size:24px;margin-bottom:12px">📋</div>
          <div style="font-size:12pt;font-weight:600">ไม่พบข้อมูลที่บันทึกไว้</div>
          <div style="font-size:10pt;color:#999;margin-top:6px">กรุณากลับไปกรอกแบบฟอร์มและบันทึกข้อมูลก่อน</div>
        </div>`;
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const targetId = params.get("id");

        let recordToPrint;
        if (targetId) {
          recordToPrint = records.find(r => r.id === targetId);
        }

        if (!recordToPrint) {
          recordToPrint = records[0]; // fallback to latest if id not found
        }

        container.innerHTML = renderRecord(recordToPrint.data);
      } catch (e) {
        container.innerHTML = '<p style="color:red">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
      }
    }

    loadAndRender();
  </script>

</body>

</html>
