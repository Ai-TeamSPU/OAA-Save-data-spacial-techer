<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>บันทึกข้อมูลอาจารย์พิเศษ · มหาวิทยาลัยศรีปทุม</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f1f5f9; }

    /* ===== Progress Bar Loading Screen ===== */
    #loading-screen {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
    }
    #loading-screen .logo {
      font-size: 56px; animation: pulse 1.4s ease-in-out infinite;
    }
    #loading-screen .title {
      color: #fff; font-size: 22px; font-weight: 800; text-align: center; line-height: 1.4;
    }
    #loading-screen .subtitle {
      color: rgba(255,255,255,0.7); font-size: 13px; margin-top: -20px; text-align: center;
    }
    #loading-screen .bar-container {
      width: 280px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden;
    }
    #loading-screen .bar-fill {
      height: 100%; background: #fff; border-radius: 10px;
      width: 0%; transition: width 0.12s ease-out;
    }
    #loading-screen .bar-pct {
      color: rgba(255,255,255,0.6); font-size: 12px; margin-top: -18px;
    }

    #root { display: none; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; pointer-events: none; }
    }
  </style>
  <template id="__bundler_thumbnail" data-bg-color="#1e3a8a">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#1e3a8a"/>
      <rect x="20" y="14" width="80" height="10" rx="3" fill="rgba(255,255,255,0.9)"/>
      <rect x="20" y="30" width="80" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>
      <rect x="20" y="40" width="80" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>
      <rect x="20" y="50" width="80" height="6" rx="2" fill="rgba(255,255,255,0.25)"/>
      <rect x="20" y="62" width="36" height="8" rx="3" fill="#60a5fa"/>
    </svg>
  </template>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="logo">🎓</div>
  <div class="title">บันทึกข้อมูลอาจารย์พิเศษ</div>
  <div class="subtitle">Adjunct Instructor Information System</div>
  <div class="bar-container">
    <div class="bar-fill" id="bar-fill"></div>
  </div>
  <div class="bar-pct" id="bar-pct">0%</div>
</div>

<!-- App Root -->
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Components -->
<script type="text/babel" src="components.jsx"></script>
<!-- App (data + logic combined) -->
<script type="text/babel" src="app.jsx"></script>

<!-- Progress Bar Logic -->
<script>
  // Progress bar: fast at start, slow toward end
  var pct = 0;
  var bar = document.getElementById('bar-fill');
  var pctLabel = document.getElementById('bar-pct');

  function easeProgress(current) {
    // Fast first 70%, then slow down
    if (current < 70) return current + (Math.random() * 8 + 4);
    if (current < 88) return current + (Math.random() * 2.5 + 1);
    if (current < 96) return current + (Math.random() * 0.8 + 0.2);
    return current;
  }

  var interval = setInterval(function() {
    pct = easeProgress(pct);
    if (pct >= 97) { clearInterval(interval); pct = 97; }
    bar.style.width = pct.toFixed(1) + '%';
    pctLabel.textContent = Math.floor(pct) + '%';
  }, 120);

  // When React renders, complete the bar and hide loader
  window.__appReady = function() {
    clearInterval(interval);
    bar.style.transition = 'width 0.4s ease-out';
    bar.style.width = '100%';
    pctLabel.textContent = '100%';
    setTimeout(function() {
      var screen = document.getElementById('loading-screen');
      screen.style.animation = 'fadeOut 0.4s ease forwards';
      setTimeout(function() {
        screen.style.display = 'none';
        document.getElementById('root').style.display = 'block';
      }, 400);
    }, 350);
  };

  // Fallback: hide after 5s no matter what
  setTimeout(function() {
    if (document.getElementById('loading-screen').style.display !== 'none') {
      window.__appReady && window.__appReady();
    }
  }, 5000);
</script>

<!-- Signal app ready after Babel transpile -->
<script type="text/babel">
  // Called after all babel scripts loaded
  setTimeout(() => { window.__appReady && window.__appReady(); }, 200);
</script>

</body>
</html>
